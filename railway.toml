[build]
# Use the Dockerfile in the root of the repo
dockerfile = "Dockerfile"

[deploy]
# Start Livekit worker in background (&) and FastAPI in foreground (listening on $PORT)
startCommand = "python -m app.main start & uvicorn app.main:app --host 0.0.0.0 --port $PORT"

# Health check: Railway will probe this before marking the service healthy
# Adjust the path/interval to match your FastAPI /health endpoint
healthcheckPath = "/health"
healthcheckTimeout = 120          # seconds to wait for a healthy response

# Give the LiveKit worker time to connect before Railway considers it unhealthy
# The worker + model download can take up to 60s on cold start
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
